<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marketplace – Register</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="auth-body">
  <div class="auth-card">
    <div class="auth-logo">
      <i class="fa-solid fa-store"></i>
      <span>Marketplace</span>
    </div>
    <h2>Create account</h2>
    <p class="auth-subtitle">Join the marketplace today</p>

    <div id="error-banner" class="error-banner" style="display:none"></div>

    <form id="register-form" novalidate>
      <div class="form-group">
        <label for="username">Username</label>
        <div class="input-icon">
          <i class="fa-regular fa-user"></i>
          <input type="text" id="username" placeholder="johndoe" autocomplete="username" required>
        </div>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <div class="input-icon">
          <i class="fa-regular fa-envelope"></i>
          <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required>
        </div>
      </div>
      <div class="form-group">
        <label for="city">City <span class="optional">(optional)</span></label>
        <div class="input-icon">
          <i class="fa-solid fa-location-dot"></i>
          <input type="text" id="city" placeholder="New York" autocomplete="address-level2">
        </div>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-icon">
          <i class="fa-solid fa-lock"></i>
          <input type="password" id="password" placeholder="Min. 6 characters" autocomplete="new-password" required>
        </div>
      </div>
      <div class="form-group">
        <label for="confirm">Confirm Password</label>
        <div class="input-icon">
          <i class="fa-solid fa-lock"></i>
          <input type="password" id="confirm" placeholder="Repeat password" autocomplete="new-password" required>
        </div>
      </div>
      <button type="submit" class="btn-primary btn-full" id="submit-btn">
        <span id="btn-text">Create Account</span>
        <span id="btn-spinner" class="spinner" style="display:none"></span>
      </button>
    </form>

    <p class="auth-footer">
      Already have an account? <a href="/">Sign in</a>
    </p>
  </div>

  <script>
    if (localStorage.getItem('token')) {
      window.location.href = '/marketplace';
    }

    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const email    = document.getElementById('email').value.trim();
      const city     = document.getElementById('city').value.trim();
      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirm').value;
      const banner   = document.getElementById('error-banner');
      const btnText  = document.getElementById('btn-text');
      const spinner  = document.getElementById('btn-spinner');

      banner.style.display = 'none';

      if (password !== confirm) {
        banner.textContent = 'Passwords do not match.';
        banner.style.display = 'block';
        return;
      }
      if (password.length < 6) {
        banner.textContent = 'Password must be at least 6 characters.';
        banner.style.display = 'block';
        return;
      }

      btnText.style.display = 'none';
      spinner.style.display = 'inline-block';

      try {
        const res  = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, password, city }),
        });
        const data = await res.json();

        if (!res.ok) {
          banner.textContent = data.error || 'Registration failed.';
          banner.style.display = 'block';
        } else {
          localStorage.setItem('token', data.token);
          localStorage.setItem('currentUser', JSON.stringify(data.user));
          window.location.href = '/marketplace';
        }
      } catch {
        banner.textContent = 'Network error. Please try again.';
        banner.style.display = 'block';
      } finally {
        btnText.style.display = 'inline';
        spinner.style.display = 'none';
      }
    });
  </script>
</body>
</html>
